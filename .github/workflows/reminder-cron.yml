name: Reminder Cron

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger reminder check
        run: |
          curl -sSf -o /dev/null -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://law-firm-management-system.r4ppz.dev/api/cron/reminders
