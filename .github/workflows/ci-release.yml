name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm validate

      - run: pnpm test

  release:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
      version: ${{ steps.calver.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate CalVer version
        id: calver
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d')"
          LAST=$(git tag -l "${DATE_TAG}.*" | sort -V | tail -1)
          if [ -z "$LAST" ]; then
            PATCH=0
          else
            PATCH=$(( ${LAST##*.} + 1 ))
          fi
          TAG="${DATE_TAG}.${PATCH}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version
        if: steps.calver.outputs.version != ''
        env:
          VERSION: ${{ steps.calver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm pkg set version="$VERSION"
          git add package.json
          git commit -m "chore: bump package.json to $VERSION [skip ci]"

      - name: Push version sync commit
        if: steps.calver.outputs.version != ''
        run: git push

      - name: Create CalVer tag and release
        if: steps.calver.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.calver.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --target "$(git rev-parse HEAD)" \
            --title "$TAG"

  docker:
    needs: release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.version }}
