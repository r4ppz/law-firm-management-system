services:
  db:
    image: postgres:16-alpine
    container_name: postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: testing
      POSTGRES_USER: testing
      POSTGRES_PASSWORD: testing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testing -d testing"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prisma-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://testing:testing@db:5432/testing
    command: ["pnpm", "prisma", "migrate", "deploy"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-prod
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://testing:testing@db:5432/testing
    ports:
      - "3000:3000"

volumes:
  postgres_data:
