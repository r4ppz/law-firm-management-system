x-image: &app-image ghcr.io/four4Bytes/law-firm-management-system:latest

services:
  db:
    image: postgres:16-alpine
    container_name: postgres-prod
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  migrate:
    image: *app-image
    container_name: prisma-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.prod
    environment:
      NODE_ENV: production
    command: ["pnpm", "prisma", "migrate", "deploy"]

  minio:
    image: minio/minio:latest
    container_name: minio-prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    expose:
      - "9000"
      - "9001"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/law-firm-files &&
        mc encrypt set sse-s3 local/law-firm-files &&
        echo 'Bucket law-firm-files created successfully'
      "

  web:
    image: *app-image
    container_name: nextjs-prod
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: true
      AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
